<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yóllotl - Estimulación Cognitiva</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para los íconos clínicos y lúdicos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* Estilos específicos para la impresión de reportes clínicos */
      @media print {
        body * { visibility: hidden; }
        .print-area, .print-area * { visibility: visible; }
        .print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
        .no-print { display: none !important; }
        .glass-print { background: white !important; border: 1px solid #ccc !important; box-shadow: none !important; color: black !important;}
        .glass-print * { color: black !important; text-shadow: none !important; }
      }
      /* Animaciones extra */
      .animate-spin-slow { animation: spin 3s linear infinite; }
    </style>
</head>
<body class="bg-slate-900 m-0 p-0 font-sans">
    
    <!-- Aquí se renderizará la App de React -->
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, Fragment } = React;

      // --- SISTEMA DE ALMACENAMIENTO LOCAL (localStorage) ---
      const saveToHistory = (gameData, config, results, mode) => {
        try {
          const history = JSON.parse(localStorage.getItem('yollotl_history') || '[]');
          const newRecord = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            gameTitle: gameData.title,
            mode: mode,
            playerName: config.playerName || 'Anónimo',
            duration: config.duration,
            speed: config.speed,
            results: results
          };
          history.unshift(newRecord); 
          if (history.length > 50) history.pop(); // Límite de 50 registros
          localStorage.setItem('yollotl_history', JSON.stringify(history));
        } catch (e) {
          console.error("Error guardando historial local", e);
        }
      };

      const getHistory = () => {
        try { return JSON.parse(localStorage.getItem('yollotl_history') || '[]'); } 
        catch (e) { return []; }
      };

      const clearHistory = () => {
        if (window.confirm("¿Estás seguro de que deseas borrar todo el historial? Esta acción no se puede deshacer.")) {
          localStorage.removeItem('yollotl_history');
          return [];
        }
        return getHistory();
      };

      // --- COMPONENTES UI COMPARTIDOS ---
      const GlassPanel = ({ children, className = '', mode, onClick }) => {
        const baseStyle = "backdrop-blur-xl border rounded-3xl shadow-2xl transition-all duration-500 relative overflow-hidden";
        const modeStyle = mode === 'kids' 
          ? "bg-white/70 border-white/80 shadow-[0_8px_32px_0_rgba(31,38,135,0.1)] text-slate-800" 
          : "bg-[#0C1B33]/70 border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.5)] text-slate-100";
        
        return (
          <div className={`${baseStyle} ${modeStyle} ${className}`} onClick={onClick}>
            {children}
          </div>
        );
      };

      const Button = ({ onClick, children, variant = 'primary', mode, className = '', disabled = false }) => {
        const base = "relative overflow-hidden rounded-2xl font-bold transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 px-6 py-3 no-print";
        let colors = "";
        
        if (mode === 'kids') {
          colors = variant === 'primary' 
            ? "bg-gradient-to-r from-[#00FFCC] to-[#00E5B8] text-teal-900 shadow-lg shadow-teal-500/30 hover:shadow-teal-500/50"
            : variant === 'danger' ? "bg-red-100 text-red-600 hover:bg-red-200"
            : "bg-white text-slate-700 shadow-sm hover:bg-slate-50 border border-slate-100";
        } else {
          colors = variant === 'primary'
            ? "bg-gradient-to-r from-[#CD7F32] to-[#B87333] text-white shadow-lg shadow-[#CD7F32]/30 hover:shadow-[#CD7F32]/50 border border-[#CD7F32]/50"
            : variant === 'danger' ? "bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30"
            : "bg-white/5 text-white hover:bg-white/10 border border-white/10";
        }

        if (disabled) colors = "bg-gray-400/50 text-gray-500 cursor-not-allowed opacity-50";

        return (
          <button onClick={onClick} disabled={disabled} className={`${base} ${colors} ${className}`}>
            {children}
          </button>
        );
      };

      const ProgressBar = ({ current, total, mode }) => {
        const percentage = Math.min(100, Math.max(0, (current / total) * 100));
        return (
          <div className="w-full max-w-md mx-auto mt-4 no-print">
            <div className="flex justify-between text-xs mb-1 font-medium opacity-70">
              <span>Progreso</span>
              <span>{current} / {total}</span>
            </div>
            <div className={`h-2 rounded-full w-full overflow-hidden ${mode === 'kids' ? 'bg-slate-200' : 'bg-white/10'}`}>
              <div 
                className={`h-full transition-all duration-500 ${mode === 'kids' ? 'bg-teal-400' : 'bg-[#CD7F32]'}`}
                style={{ width: `${percentage}%` }}
              />
            </div>
          </div>
        );
      };

      // --- JUEGOS MODO NIÑOS ---
      const CatchTheStar = ({ onFinish, config, mode }) => {
        const [score, setScore] = useState(0);
        const [lives, setLives] = useState(3);
        const [starPos, setStarPos] = useState({ x: 50, y: 0 });
        const [playerX, setPlayerX] = useState(50);
        const [isPlaying, setIsPlaying] = useState(true);
        const containerRef = useRef(null);
        const requestRef = useRef();

        const targetScore = config.duration === 'mini' ? 5 : 10;
        const speedMultiplier = config.speed === 'slow' ? 0.5 : config.speed === 'fast' ? 1.5 : 1;

        const handleMove = (e) => {
          if (!containerRef.current || !isPlaying) return;
          const rect = containerRef.current.getBoundingClientRect();
          let clientX = e.clientX;
          if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
          let x = ((clientX - rect.left) / rect.width) * 100;
          setPlayerX(Math.max(5, Math.min(95, x)));
        };

        useEffect(() => {
          if (!isPlaying) return;
          let speed = (0.5 + (score * 0.05)) * speedMultiplier;
          let currentY = starPos.y;

          const update = () => {
            currentY += speed;
            if (currentY > 85 && currentY < 95) {
              if (Math.abs(starPos.x - playerX) < 15) {
                setScore(s => s + 1);
                setStarPos({ x: Math.random() * 80 + 10, y: 0 });
                currentY = 0;
                if (score + 1 >= targetScore) {
                  setIsPlaying(false);
                  setTimeout(() => onFinish({ Puntuación: `${targetScore}/${targetScore}`, Estado: 'Victoria', Vidas_Restantes: lives }), 1000);
                }
              }
            } else if (currentY > 100) {
              setLives(l => {
                const newLives = l - 1;
                if (newLives <= 0) {
                  setIsPlaying(false);
                  setTimeout(() => onFinish({ Puntuación: `${score}/${targetScore}`, Estado: 'Derrota', Vidas_Restantes: 0 }), 1000);
                }
                return newLives;
              });
              setStarPos({ x: Math.random() * 80 + 10, y: 0 });
              currentY = 0;
            } else {
              setStarPos(prev => ({ ...prev, y: currentY }));
            }
            requestRef.current = requestAnimationFrame(update);
          };
          requestRef.current = requestAnimationFrame(update);
          return () => cancelAnimationFrame(requestRef.current);
        }, [isPlaying, starPos.x, playerX, score, onFinish, targetScore, speedMultiplier, lives]);

        return (
          <div className="w-full flex flex-col h-full">
            <ProgressBar current={score} total={targetScore} mode={mode} />
            <div className="w-full h-[50vh] md:h-[60vh] mt-4 relative overflow-hidden bg-gradient-to-b from-blue-900 to-indigo-900 rounded-3xl cursor-none touch-none" ref={containerRef} onMouseMove={handleMove} onTouchMove={handleMove}>
              <div className="absolute top-4 left-4 right-4 flex justify-between text-white font-bold text-xl z-10">
                <div className="flex items-center gap-2"><i className="fa-solid fa-star text-yellow-400"></i> {score}/{targetScore}</div>
                <div className="flex items-center gap-2 text-red-400">{'❤️'.repeat(lives)}</div>
              </div>
              <div className="absolute w-8 h-8 text-yellow-300 transition-transform duration-75" style={{ left: `${starPos.x}%`, top: `${starPos.y}%`, transform: 'translate(-50%, -50%)', filter: 'drop-shadow(0 0 10px rgba(255,215,0,0.8))' }}>
                <i className="fa-solid fa-star text-3xl animate-spin-slow"></i>
              </div>
              <div className="absolute bottom-4 w-24 h-6 bg-[#00FFCC] rounded-full shadow-[0_0_20px_#00FFCC] transition-transform duration-75" style={{ left: `${playerX}%`, transform: 'translateX(-50%)' }}></div>
            </div>
          </div>
        );
      };

      const ColorMemory = ({ onFinish, config, mode }) => {
        const colors = [
          { id: 0, bg: 'bg-red-400', active: 'bg-red-300 shadow-[0_0_30px_#f87171]' },
          { id: 1, bg: 'bg-blue-400', active: 'bg-blue-300 shadow-[0_0_30px_#60a5fa]' },
          { id: 2, bg: 'bg-green-400', active: 'bg-green-300 shadow-[0_0_30px_#4ade80]' },
          { id: 3, bg: 'bg-yellow-400', active: 'bg-yellow-300 shadow-[0_0_30px_#facc15]' }
        ];

        const [sequence, setSequence] = useState([]);
        const [playerStep, setPlayerStep] = useState(0);
        const [isShowing, setIsShowing] = useState(false);
        const [activeIndex, setActiveIndex] = useState(null);
        const [level, setLevel] = useState(1);

        const targetLevel = config.duration === 'mini' ? 4 : 8;
        const showTime = config.speed === 'slow' ? 1000 : config.speed === 'fast' ? 500 : 800;

        const addNewColor = useCallback(() => setSequence(prev => [...prev, Math.floor(Math.random() * 4)]), []);

        useEffect(() => { addNewColor(); }, [addNewColor]);

        useEffect(() => {
          if (sequence.length === 0) return;
          let step = 0;
          setIsShowing(true);
          const interval = setInterval(() => {
            if (step >= sequence.length) {
              clearInterval(interval);
              setActiveIndex(null);
              setIsShowing(false);
              return;
            }
            setActiveIndex(sequence[step]);
            setTimeout(() => setActiveIndex(null), showTime / 2);
            step++;
          }, showTime);
          return () => clearInterval(interval);
        }, [sequence, showTime]);

        const handleColorClick = (id) => {
          if (isShowing) return;
          setActiveIndex(id);
          setTimeout(() => setActiveIndex(null), 200);

          if (id === sequence[playerStep]) {
            if (playerStep === sequence.length - 1) {
              if (level >= targetLevel) {
                setTimeout(() => onFinish({ Nivel_Alcanzado: `${level}/${targetLevel}`, Estado: 'Completado con Éxito' }), 1000);
              } else {
                setTimeout(() => {
                  setLevel(l => l + 1);
                  setPlayerStep(0);
                  addNewColor();
                }, 1000);
              }
            } else {
              setPlayerStep(p => p + 1);
            }
          } else {
            onFinish({ Nivel_Alcanzado: `${level}/${targetLevel}`, Estado: 'Falló la secuencia' });
          }
        };

        return (
          <div className="flex flex-col items-center py-4 w-full">
            <ProgressBar current={level} total={targetLevel} mode={mode} />
            <div className="flex flex-col items-center gap-8 mt-8">
              <h3 className="text-2xl font-bold text-slate-700">Nivel {level}</h3>
              <div className="grid grid-cols-2 gap-4 w-64 h-64">
                {colors.map((c) => (
                  <button key={c.id} onClick={() => handleColorClick(c.id)} disabled={isShowing}
                    className={`rounded-3xl transition-all duration-200 ${c.bg} ${activeIndex === c.id ? c.active + ' scale-105' : 'scale-100 opacity-80'} ${isShowing ? 'cursor-default' : 'cursor-pointer hover:opacity-100'}`} />
                ))}
              </div>
              <p className="text-slate-500 font-medium h-6">{isShowing ? "Observa atentamente..." : "¡Repite la secuencia!"}</p>
            </div>
          </div>
        );
      };

      const CountAndLearn = ({ onFinish, config, mode }) => {
        const [targetCount, setTargetCount] = useState(0);
        const [options, setOptions] = useState([]);
        const [round, setRound] = useState(1);
        const [score, setScore] = useState(0);
        const targetRounds = config.duration === 'mini' ? 3 : 6;
        
        const emojis = ['🍎', '🐶', '🚗', '🎈', '⭐'];
        const [activeEmoji, setActiveEmoji] = useState('🍎');

        const generateRound = useCallback(() => {
          const maxCount = config.speed === 'fast' ? 12 : config.speed === 'slow' ? 5 : 8;
          const count = Math.floor(Math.random() * maxCount) + 1;
          setTargetCount(count);
          setActiveEmoji(emojis[Math.floor(Math.random() * emojis.length)]);
          
          let opts = [count];
          while(opts.length < 3) {
            let randomOpt = Math.floor(Math.random() * maxCount) + 1;
            if (!opts.includes(randomOpt)) opts.push(randomOpt);
          }
          setOptions(opts.sort(() => Math.random() - 0.5));
        }, [config.speed]);

        useEffect(() => { generateRound(); }, [generateRound]);

        const handleSelect = (num) => {
          const isCorrect = num === targetCount;
          if (isCorrect) setScore(s => s + 1);
          
          if (round >= targetRounds) {
            onFinish({ Aciertos: `${score + (isCorrect ? 1 : 0)} de ${targetRounds}`, Rondas_Totales: targetRounds, Precisión: Math.round(((score + (isCorrect ? 1 : 0)) / targetRounds) * 100) + '%' });
          } else {
            setRound(r => r + 1);
            generateRound();
          }
        };

        return (
          <div className="flex flex-col items-center py-4 w-full text-center">
            <ProgressBar current={round} total={targetRounds} mode={mode} />
            <div className="mt-8 gap-6 flex flex-col items-center">
              <p className="text-xl text-slate-600 font-bold">¿Cuántos objetos hay en total?</p>
              <div className="flex flex-wrap justify-center gap-4 w-64 min-h-[120px] bg-white/50 p-4 rounded-2xl border border-slate-100">
                {Array.from({ length: targetCount }).map((_, i) => (
                  <span key={i} className="text-4xl animate-bounce" style={{ animationDelay: `${i * 0.1}s` }}>{activeEmoji}</span>
                ))}
              </div>
              <div className="flex gap-4 mt-6">
                {options.map(opt => (
                  <button key={opt} onClick={() => handleSelect(opt)} className="w-16 h-16 bg-white rounded-2xl shadow-md border border-slate-100 text-3xl font-bold text-teal-600 hover:bg-teal-50 hover:scale-105 transition-all">
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const FindTheAnimal = ({ onFinish, config, mode }) => {
        const animals = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮'];
        const [targetAnimal, setTargetAnimal] = useState('');
        const [grid, setGrid] = useState([]);
        const [round, setRound] = useState(1);
        const [score, setScore] = useState(0);
        const [startTime, setStartTime] = useState(0);
        const [times, setTimes] = useState([]);

        const targetRounds = config.duration === 'mini' ? 3 : 6;
        const gridSize = config.speed === 'fast' ? 16 : config.speed === 'slow' ? 6 : 9;

        const generateRound = useCallback(() => {
          const target = animals[Math.floor(Math.random() * animals.length)];
          setTargetAnimal(target);
          let newGrid = [target];
          while(newGrid.length < gridSize) {
            let randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            if (randomAnimal !== target) newGrid.push(randomAnimal);
          }
          setGrid(newGrid.sort(() => Math.random() - 0.5));
          setStartTime(Date.now());
        }, [gridSize]);

        useEffect(() => { generateRound(); }, [generateRound]);

        const handleSelect = (animal) => {
          const reactionTime = Date.now() - startTime;
          const isCorrect = animal === targetAnimal;
          
          if (isCorrect) {
            setScore(s => s + 1);
            setTimes(prev => [...prev, reactionTime]);
          }

          if (round >= targetRounds) {
            const finalTimes = isCorrect ? [...times, reactionTime] : times;
            const avgTime = finalTimes.length > 0 ? (finalTimes.reduce((a,b) => a+b, 0) / finalTimes.length / 1000).toFixed(2) : 0;
            onFinish({ 
              Aciertos: `${score + (isCorrect ? 1 : 0)} de ${targetRounds}`, 
              Tiempo_Reacción_Promedio: `${avgTime} seg`,
              Atención_Visual: isCorrect && score === targetRounds - 1 ? 'Excelente' : 'Requiere Práctica'
            });
          } else {
            setRound(r => r + 1);
            generateRound();
          }
        };

        return (
          <div className="flex flex-col items-center py-4 w-full text-center">
            <ProgressBar current={round} total={targetRounds} mode={mode} />
            <div className="mt-8 flex flex-col items-center gap-6">
              <div className="flex items-center gap-3 text-xl font-bold text-slate-600 bg-white/50 px-6 py-3 rounded-2xl">
                Encuentra a: <span className="text-4xl">{targetAnimal}</span>
              </div>
              <div className={`grid gap-3 ${gridSize > 9 ? 'grid-cols-4' : 'grid-cols-3'}`}>
                {grid.map((animal, i) => (
                  <button key={i} onClick={() => handleSelect(animal)} className="w-16 h-16 bg-white rounded-2xl shadow-sm border border-slate-100 text-4xl flex items-center justify-center hover:bg-teal-50 hover:scale-105 transition-all">
                    {animal}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      };

      // --- JUEGOS MODO ADULTOS ---
      const StroopTest = ({ onFinish, config, mode }) => {
        const WORDS = ["ROJO", "AZUL", "VERDE", "AMARILLO"];
        const COLORS = ["text-red-500", "text-blue-500", "text-green-500", "text-yellow-500"];
        
        const [currentRound, setCurrentRound] = useState(0);
        const [gameState, setGameState] = useState('waiting');
        const [currentWord, setCurrentWord] = useState('');
        const [currentColorClass, setCurrentColorClass] = useState('');
        
        const [metrics, setMetrics] = useState({ aciertos: 0, errores: 0, omisiones: 0, tiempos: [] });
        const showTimeRef = useRef(0);
        const timeoutRef = useRef(null);

        const targetRounds = config.duration === 'mini' ? 6 : 15;
        const timeLimit = config.speed === 'slow' ? 2000 : config.speed === 'fast' ? 1000 : 1500;

        const nextRound = useCallback(() => {
          if (currentRound >= targetRounds) {
            const avgTime = metrics.tiempos.length > 0 ? (metrics.tiempos.reduce((a,b)=>a+b,0) / metrics.tiempos.length).toFixed(0) : 0;
            onFinish({ 
              Aciertos: metrics.aciertos, 
              Errores: metrics.errores, 
              Omisiones: metrics.omisiones,
              Tiempo_Reacción_Medio: `${avgTime} ms`,
              Control_Inhibitorio: metrics.errores > 2 ? 'Bajo' : 'Óptimo'
            });
            return;
          }
          setGameState('showing');
          const isTarget = Math.random() < 0.4; 
          let wordText = isTarget ? "AZUL" : WORDS[Math.floor(Math.random() * WORDS.length)];
          setCurrentWord(wordText);
          setCurrentColorClass(COLORS[Math.floor(Math.random() * COLORS.length)]);
          setCurrentRound(r => r + 1);
          showTimeRef.current = Date.now();

          timeoutRef.current = setTimeout(() => {
            if (wordText === "AZUL") setMetrics(m => ({ ...m, omisiones: m.omisiones + 1 }));
            nextRound();
          }, timeLimit);
        }, [currentRound, metrics, onFinish, targetRounds, timeLimit]);

        useEffect(() => {
          const t = setTimeout(nextRound, 1000);
          return () => clearTimeout(t);
        }, []);

        const handleReaction = () => {
          if (gameState !== 'showing') return;
          clearTimeout(timeoutRef.current);
          const reactionTime = Date.now() - showTimeRef.current;
          
          if (currentWord === "AZUL") {
            setMetrics(m => ({ ...m, aciertos: m.aciertos + 1, tiempos: [...m.tiempos, reactionTime] }));
          } else {
            setMetrics(m => ({ ...m, errores: m.errores + 1 }));
          }
          setGameState('waiting');
          setTimeout(nextRound, 500);
        };

        useEffect(() => {
          const handleKeyDown = (e) => { if (e.code === 'Space') { e.preventDefault(); handleReaction(); } };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
        }, [handleReaction]);

        return (
          <div className="flex flex-col items-center py-4 w-full text-center h-full">
            <ProgressBar current={currentRound} total={targetRounds} mode={mode} />
            <div className="flex-1 flex flex-col justify-center gap-10 mt-8">
              <div className="h-32 flex items-center justify-center">
                {gameState === 'showing' ? (
                  <h1 className={`text-6xl md:text-8xl font-black tracking-widest uppercase drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] ${currentColorClass}`}>{currentWord}</h1>
                ) : <div className="text-slate-600 text-4xl font-light animate-pulse">+</div>}
              </div>
              <div className="flex flex-col items-center gap-4">
                <Button onClick={handleReaction} mode="adults" className="w-64 py-6 text-xl tracking-wider shadow-[0_0_20px_rgba(205,127,50,0.2)]">REACCIONAR</Button>
                <p className="text-sm text-slate-500">O presiona la <strong className="text-white">Barra Espaciadora</strong></p>
              </div>
            </div>
          </div>
        );
      };

      const AdvancedMemory = ({ onFinish, config, mode }) => {
        const [level, setLevel] = useState(config.speed === 'fast' ? 4 : 3); 
        const [sequence, setSequence] = useState([]);
        const [displayNumber, setDisplayNumber] = useState(null);
        const [phase, setPhase] = useState('start');
        const [userInput, setUserInput] = useState('');
        const [roundsPlayed, setRoundsPlayed] = useState(0);

        const targetRounds = config.duration === 'mini' ? 3 : 5;
        const showTime = config.speed === 'slow' ? 1500 : config.speed === 'fast' ? 600 : 1000;

        const generateSequence = useCallback(() => {
          const seq = Array.from({length: level}, () => Math.floor(Math.random() * 10));
          setSequence(seq);
          return seq;
        }, [level]);

        const startLevel = useCallback(() => {
          const seq = generateSequence();
          setPhase('showing');
          setUserInput('');
          let step = 0;
          const interval = setInterval(() => {
            if (step >= seq.length) {
              clearInterval(interval);
              setDisplayNumber(null);
              setPhase('input');
              return;
            }
            setDisplayNumber(seq[step]);
            step++;
          }, showTime);
        }, [generateSequence, showTime]);

        const handleInput = (num) => {
          if (phase !== 'input') return;
          const newVal = userInput + num.toString();
          setUserInput(newVal);

          if (newVal.length === sequence.length) {
            const isCorrect = newVal === sequence.join('');
            if (roundsPlayed + 1 >= targetRounds) {
              setTimeout(() => onFinish({ 
                Amplitud_de_Memoria: `${isCorrect ? level : level - 1} dígitos`, 
                Rondas_Completadas: targetRounds,
                Evaluación: isCorrect ? 'Sobresaliente' : (level > 4 ? 'Normal' : 'Requiere Atención') 
              }), 1000);
            } else {
              if (isCorrect) {
                setTimeout(() => { setLevel(l => l + 1); setRoundsPlayed(r=>r+1); setPhase('start'); }, 1000);
              } else {
                setTimeout(() => onFinish({ 
                  Amplitud_de_Memoria: `${level - 1} dígitos`, 
                  Estado: 'Límite alcanzado por error' 
                }), 1000);
              }
            }
          }
        };

        useEffect(() => {
          if (phase === 'start') {
            const t = setTimeout(startLevel, 1000);
            return () => clearTimeout(t);
          }
        }, [phase, startLevel]);

        return (
          <div className="flex flex-col items-center py-4 w-full text-center">
            <ProgressBar current={roundsPlayed + 1} total={targetRounds} mode={mode} />
            <div className="flex flex-col items-center gap-8 mt-8">

      const NumberSequence = ({ onFinish, config, mode }) => {
        const [sequence, setSequence] = useState([]);
        const [options, setOptions] = useState([]);
        const [missingIndex, setMissingIndex] = useState(0);
        const [round, setRound] = useState(1);
        const [score, setScore] = useState(0);

        const targetRounds = config.duration === 'mini' ? 4 : 8;

        const generateSequence = useCallback(() => {
          const diff = config.speed === 'fast' ? Math.floor(Math.random() * 10) + 5 : Math.floor(Math.random() * 5) + 2;
          const start = Math.floor(Math.random() * 20);
          const seq = Array.from({length: 5}, (_, i) => start + (i * diff));
          const mIndex = Math.floor(Math.random() * 5);
          const correctAns = seq[mIndex];
          
          let opts = [correctAns];
          while(opts.length < 4) {
            let falseOpt = correctAns + (Math.floor(Math.random() * 10) - 5) * diff;
            if (falseOpt !== correctAns && !opts.includes(falseOpt) && falseOpt > 0) opts.push(falseOpt);
          }
          
          setSequence(seq);
          setMissingIndex(mIndex);
          setOptions(opts.sort(() => Math.random() - 0.5));
        }, [config.speed]);

        useEffect(() => { generateSequence(); }, [generateSequence]);

        const handleSelect = (num) => {
          const isCorrect = num === sequence[missingIndex];
          if (isCorrect) setScore(s => s + 1);
          
          if (round >= targetRounds) {
            const finalScore = score + (isCorrect ? 1 : 0);
            onFinish({ 
              Razonamiento_Lógico: `${finalScore} de ${targetRounds}`, 
              Precisión: Math.round((finalScore / targetRounds) * 100) + '%',
              Nivel: finalScore === targetRounds ? 'Avanzado' : 'Intermedio'
            });
          } else {
            setRound(r => r + 1);
            generateSequence();
          }
        };

        return (
          <div className="flex flex-col items-center py-4 w-full text-center">
            <ProgressBar current={round} total={targetRounds} mode={mode} />
            <div className="flex flex-col items-center gap-10 mt-8 w-full">
              <div className="flex gap-2 md:gap-4 text-2xl md:text-4xl font-mono text-white bg-white/5 p-6 md:p-8 rounded-2xl border border-white/10 w-full justify-center shadow-inner">
                {sequence.map((num, i) => (
                  <Fragment key={i}>
                    <span className={i === missingIndex ? "text-[#CD7F32] font-bold border-b-2 border-[#CD7F32]" : "opacity-80"}>
                      {i === missingIndex ? "??" : num}
                    </span>
                    {i < sequence.length - 1 && <span className="opacity-30">,</span>}
                  </Fragment>
                ))}
              </div>
              <div className="grid grid-cols-2 gap-4 w-full max-w-sm">
                {options.map((opt, i) => (
                  <Button key={i} onClick={() => handleSelect(opt)} variant="secondary" mode="adults" className="text-2xl font-mono py-6 hover:border-[#CD7F32]/50 hover:text-[#CD7F32]">
                    {opt}
                  </Button>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const VisualStimulus = ({ onFinish, config, mode }) => {
        const symbols = ['▲', '■', '●', '◆', '★', '✚', '✿', '✺'];
        const [phase, setPhase] = useState('ready'); 
        const [targetSymbol, setTargetSymbol] = useState('');
        const [options, setOptions] = useState([]);
        const [round, setRound] = useState(1);
        const [score, setScore] = useState(0);

        const targetRounds = config.duration === 'mini' ? 4 : 8;
        const showTime = config.speed === 'slow' ? 800 : config.speed === 'fast' ? 200 : 500;

        const startRound = useCallback(() => {
          setPhase('ready');
          const target = symbols[Math.floor(Math.random() * symbols.length)];
          setTargetSymbol(target);
          
          let opts = [target];
          while(opts.length < 4) {
            let rand = symbols[Math.floor(Math.random() * symbols.length)];
            if (!opts.includes(rand)) opts.push(rand);
          }
          setOptions(opts.sort(() => Math.random() - 0.5));

          setTimeout(() => {
            setPhase('showing');
            setTimeout(() => {
              setPhase('options');
            }, showTime);
          }, 1200);
        }, [showTime]);

        useEffect(() => { startRound(); }, [startRound]);

        const handleSelect = (sym) => {
          const isCorrect = sym === targetSymbol;
          if (isCorrect) setScore(s => s + 1);
          
          if (round >= targetRounds) {
            const finalScore = score + (isCorrect ? 1 : 0);
            onFinish({ 
              Aciertos_Visuales: `${finalScore} de ${targetRounds}`, 
              Velocidad_Estímulo: `${showTime}ms`,
              Memoria_Corto_Plazo: finalScore > targetRounds * 0.7 ? 'Alta' : 'Baja'
            });
          } else {
            setRound(r => r + 1);
            startRound();
          }
        };

        return (
          <div className="flex flex-col items-center py-4 w-full text-center h-full min-h-[350px]">
            <ProgressBar current={round} total={targetRounds} mode={mode} />
            <div className="flex-1 flex flex-col items-center justify-center w-full">
              {phase === 'ready' && (
                <div className="text-white text-3xl font-light animate-pulse flex flex-col items-center gap-4">
                  <i className="fa-solid fa-eye text-5xl text-[#CD7F32]/50"></i>
                  Atención al centro...
                </div>
              )}
              {phase === 'showing' && (
                <div className="text-[120px] text-white drop-shadow-[0_0_30px_rgba(255,255,255,0.8)] leading-none">{targetSymbol}</div>
              )}
              {phase === 'options' && (
                <div className="grid grid-cols-2 gap-6 w-full max-w-sm animate-in fade-in zoom-in duration-300">
                  {options.map((opt, i) => (
                    <button key={i} onClick={() => handleSelect(opt)} className="py-8 text-5xl text-white bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#CD7F32]/50 hover:text-[#CD7F32] transition-all shadow-lg">
                      {opt}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

                      <h3 className={`text-lg font-bold mb-4 flex items-center gap-2 ${mode === 'kids' ? 'text-slate-700' : 'text-white'}`}>
                        {activeGame.title} <span className="text-xs font-normal opacity-70 px-2 py-1 rounded-md border border-current">Vel: {gameConfig.speed}</span>
                      </h3>
                      <div className="space-y-3">
                        {Object.entries(lastResults || {}).map(([key, value]) => (
                          <div key={key} className={`flex justify-between p-3 rounded-lg ${mode === 'kids' ? 'bg-slate-50 border border-slate-100' : 'bg-white/5'}`}>
                            <span className="capitalize text-sm font-medium opacity-80">{key.replace(/_/g, ' ')}</span>
                            <span className={`font-bold ${mode === 'kids' ? 'text-teal-700' : 'text-[#CD7F32]'}`}>{value}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex flex-col sm:flex-row gap-4 justify-center mt-8 no-print">
                      <Button variant="secondary" mode={mode} onClick={() => setCurrentScreen('menu')} className="flex-1">Ir al Menú</Button>
                      <Button variant="primary" mode={mode} onClick={handlePrint} className="flex-1"><i className="fa-solid fa-print"></i> Imprimir PDF</Button>
                    </div>
                  </GlassPanel>
                )}

                {/* PANTALLA DE HISTORIAL */}
                {mode && currentScreen === 'history' && (
                  <GlassPanel mode={mode} className="p-6 max-w-4xl mx-auto w-full glass-print print-area">
                    <div className="flex justify-between items-center mb-6 border-b pb-4 border-slate-200/20">
                      <div>
                        <h2 className={`text-2xl font-bold ${mode === 'kids' ? 'text-slate-800' : 'text-white'}`}>Historial Clínico/Educativo</h2>
                        <p className={`text-sm ${mode === 'kids' ? 'text-slate-500' : 'text-slate-400'}`}>Registros guardados localmente</p>
                      </div>
                      <div className="flex gap-2 no-print">
                         <Button variant="secondary" mode={mode} onClick={handlePrint}><i className="fa-solid fa-print"></i></Button>
                         <Button variant="danger" mode={mode} onClick={() => setHistoryData(clearHistory())}>Limpiar</Button>
                      </div>
                    </div>

                    {historyData.length === 0 ? (
                      <div className="text-center py-12 opacity-50">
                        <i className="fa-solid fa-clock text-5xl mb-4 text-slate-400"></i>
                        <p className={mode === 'kids' ? 'text-slate-600' : 'text-white'}>No hay registros disponibles aún.</p>
                      </div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className={`w-full text-sm text-left ${mode === 'kids' ? 'text-slate-600' : 'text-slate-300'}`}>
                          <thead className={`text-xs uppercase ${mode === 'kids' ? 'bg-slate-100 text-slate-700' : 'bg-white/10 text-slate-200'}`}>
                            <tr>
                              <th className="px-4 py-3 rounded-tl-lg">Fecha</th>
                              <th className="px-4 py-3">Paciente</th>
                              <th className="px-4 py-3">Prueba</th>
                              <th className="px-4 py-3 rounded-tr-lg">Resultados Clave</th>
                            </tr>
                          </thead>
                          <tbody>
                            {historyData.map((record) => {
                              const mainResult = Object.entries(record.results)[0];
                              return (
                                <tr key={record.id} className={`border-b last:border-0 ${mode === 'kids' ? 'border-slate-100 hover:bg-slate-50' : 'border-white/5 hover:bg-white/5'}`}>
                                  <td className="px-4 py-3 font-medium whitespace-nowrap">{record.date.split(',')[0]}</td>
                                  <td className="px-4 py-3 font-bold">{record.playerName}</td>
                                  <td className="px-4 py-3">
                                    {record.gameTitle}
                                    <span className="block text-xs opacity-60">Vel: {record.speed} | Tipo: {record.duration}</span>
                                  </td>
                                  <td className="px-4 py-3">
                                    {mainResult ? <span className="font-mono bg-black/5 px-2 py-1 rounded">{mainResult[0].replace(/_/g, ' ')}: {mainResult[1]}</span> : 'N/A'}
                                  </td>
                                </tr>
                              )
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </GlassPanel>
                )}

              </main>

              {/* Footer */}
              <footer className={`shrink-0 text-center py-6 text-xs no-print ${mode === 'kids' ? 'text-slate-400' : 'text-slate-500'}`}>
                <p className="font-medium">Yóllotl v1.2.0 — Sistema de Estimulación Cognitiva</p>
                <p className="opacity-70 mt-1 max-w-2xl mx-auto">
                  Aviso: Esta es una herramienta de apoyo tecnológico orientada al entrenamiento y la medición reactiva. 
                  <strong> NO sustituye una evaluación neuropsicológica, diagnóstico o tratamiento médico profesional.</strong>
                </p>
              </footer>

            </div>
          </div>
        );
      }

      // Inicialización de la App
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<YollotlApp />);
    </script>
</body>
</html>
